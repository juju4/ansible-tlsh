---

tlsh_python_version: 3
tlsh_build_deps:
  - cmake
  - make
  - gcc
  - g++
  - python3-dev
  - python3-pip
  # PEP632, https://medium.com/@syeasar.kuet/pythons-distutils-is-gone-in-ubuntu-24-04-and-a-simple-workaround-5d859dde465b
  - python3-setuptools

tlsh_python_pkgs:
  - python3-virtualenv
  - python3-pip

tlsh_python_bin: "python3"
tlsh_python_pip: "pip3"
tlsh_python_version_full: '3.14'
tlsh_python_bindings: "{% if tlsh_virtualenv_path | string %}{{ tlsh_virtualenv_path }}/lib/python3.14/site-packages/tlsh.cpython-312-x86_64-linux-gnu.so{% else %}/usr/local/lib/python3.14/dist-packages/tlsh.cpython-312-x86_64-linux-gnu.so{% endif %}"
